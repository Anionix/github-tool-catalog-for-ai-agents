schema_version: 1
categories:
  - GitHub MCP / Connectors
  - GitHub CLI and API
  - gh Extensions
  - Agentic Workflows
  - Browser and Testing MCP
  - Code Intelligence MCP
  - Docs and Knowledge MCP
  - Formal Proof / Lean support
  - Git TUI
  - Git Diff and Repo Utilities
  - Legacy / Avoid
  - Watchlist / Not yet recommended
tools:
  - name: GitHub MCP Server
    repo: github/github-mcp-server
    url: https://github.com/github/github-mcp-server
    kind: mcp
    category: GitHub MCP / Connectors
    summary: Official GitHub MCP server for repository, issue, pull request, workflow, project, org, and gist access from AI agents.
    agent_usefulness: high
    human_usefulness: medium
    risk: high
    recommended_status: recommended
    install: codex mcp add github --url https://api.githubcopilot.com/mcp/ --bearer-token-env-var GITHUB_PAT_TOKEN
    notes: Use targeted toolsets or read-only mode when broad write access is unnecessary.

  - name: GitHub CLI
    repo: cli/cli
    url: https://github.com/cli/cli
    kind: cli
    category: GitHub CLI and API
    summary: Official GitHub command line interface for issues, pull requests, Actions, releases, rulesets, API calls, and authenticated automation.
    agent_usefulness: high
    human_usefulness: high
    risk: medium
    recommended_status: recommended
    install: brew install gh
    notes: Prefer gh api for exact REST or GraphQL operations that are not exposed by a connector or MCP tool; treat gh skill as a gh capability rather than a separate tool entry.

  - name: gh-dash
    repo: dlvhdr/gh-dash
    url: https://github.com/dlvhdr/gh-dash
    kind: gh-extension
    category: gh Extensions
    summary: Terminal dashboard for GitHub pull requests, issues, custom sections, custom actions, and keyboard-driven triage.
    agent_usefulness: low
    human_usefulness: high
    risk: medium
    recommended_status: situational
    install: gh extension install dlvhdr/gh-dash
    notes: Great for human review queues; audit third-party extension trust and Nerd Font/UI assumptions before default rollout.

  - name: gh-stack
    repo: github/gh-stack
    url: https://github.com/github/gh-stack
    kind: gh-extension
    category: gh Extensions
    summary: GitHub extension for stacked branches and stacked pull requests, including agent-facing skill guidance.
    agent_usefulness: medium
    human_usefulness: high
    risk: high
    recommended_status: watch
    install: gh extension install github/gh-stack
    notes: Preview-oriented stacked PR workflow; use only when stacked PRs are enabled and the team's auth model supports the extension.

  - name: gh-news
    repo: chmouel/gh-news
    url: https://github.com/chmouel/gh-news
    kind: gh-extension
    category: gh Extensions
    summary: GitHub CLI notification TUI for reading, filtering, previewing, muting, snoozing, and archiving GitHub notifications from the terminal.
    agent_usefulness: low
    human_usefulness: medium
    risk: medium
    recommended_status: watch
    install: gh extension install chmouel/gh-news
    notes: Promising notification-focused gh extension; it uses token-backed GitHub notification actions, so keep it in watch until publisher trust and team fit are reviewed.

  - name: GitHub Agentic Workflows
    repo: github/gh-aw
    url: https://github.com/github/gh-aw
    kind: agent-workflow
    category: Agentic Workflows
    summary: GitHub CLI extension for defining and running repository agent workflows through GitHub Actions.
    agent_usefulness: medium
    human_usefulness: medium
    risk: high
    recommended_status: watch
    install: gh extension install github/gh-aw
    notes: Powerful but operationally heavy; treat permissions, billing, guardrails, and workflow safety as first-class review items.

  - name: GitHub Copilot CLI
    repo: github/copilot-cli
    url: https://github.com/github/copilot-cli
    kind: agent-cli
    category: Agentic Workflows
    summary: GitHub Copilot coding agent for terminal workflows, with configurable permissions and built-in GitHub MCP support.
    agent_usefulness: medium
    human_usefulness: high
    risk: high
    recommended_status: situational
    install: brew install copilot-cli
    notes: A separate agent runtime rather than a Codex tool; prefer this standalone CLI over retired legacy gh-copilot workflows.

  - name: Playwright MCP
    repo: microsoft/playwright-mcp
    url: https://github.com/microsoft/playwright-mcp
    kind: mcp
    category: Browser and Testing MCP
    summary: Browser automation MCP server for testing and data extraction through Playwright's accessibility-oriented model.
    agent_usefulness: high
    human_usefulness: medium
    risk: high
    recommended_status: recommended
    install: codex mcp add playwright -- npx -y @playwright/mcp@latest
    notes: Prefer constrained browser contexts for agent runs that do not need local user profile state.

  - name: Chrome DevTools MCP
    repo: ChromeDevTools/chrome-devtools-mcp
    url: https://github.com/ChromeDevTools/chrome-devtools-mcp
    kind: mcp
    category: Browser and Testing MCP
    summary: Chrome DevTools MCP server for navigation, script execution, screenshots, performance, network, and debugging workflows.
    agent_usefulness: high
    human_usefulness: medium
    risk: high
    recommended_status: recommended
    install: codex mcp add chrome-devtools -- npx -y chrome-devtools-mcp@latest --slim --headless --isolated
    notes: The slim isolated mode is a safer default for general coding-agent use.

  - name: Serena
    repo: oraios/serena
    url: https://github.com/oraios/serena
    kind: mcp
    category: Code Intelligence MCP
    summary: Semantic code retrieval and editing MCP server for coding agents, backed by language-server style project understanding.
    agent_usefulness: high
    human_usefulness: medium
    risk: high
    recommended_status: recommended
    install: codex mcp add serena -- serena start-mcp-server --project-from-cwd --context=codex
    notes: Best used with project-scoped startup rather than broad filesystem access.

  - name: Context7
    repo: upstash/context7
    url: https://github.com/upstash/context7
    kind: mcp
    category: Docs and Knowledge MCP
    summary: Documentation MCP server that injects current library docs and examples into agent prompts.
    agent_usefulness: high
    human_usefulness: medium
    risk: medium
    recommended_status: recommended
    install: codex mcp add context7 -- npx -y @upstash/context7-mcp@latest
    notes: Useful when framework or API behavior is likely to have changed since model training.

  - name: lean-lsp-mcp
    repo: oOo0oOo/lean-lsp-mcp
    url: https://github.com/oOo0oOo/lean-lsp-mcp
    kind: mcp
    category: Formal Proof / Lean support
    summary: Lean LSP MCP server for proof diagnostics, goal inspection, Loogle-style search, and optional Lean REPL acceleration.
    agent_usefulness: high
    human_usefulness: medium
    risk: medium
    recommended_status: recommended
    install: codex mcp add lean-lsp --env LEAN_PROJECT_PATH=/path/to/lean/project -- uvx lean-lsp-mcp
    notes: Strong fit for Lean repositories; scope LEAN_PROJECT_PATH to the active proof project.

  - name: lazygit
    repo: jesseduffield/lazygit
    url: https://github.com/jesseduffield/lazygit
    kind: git-tui
    category: Git TUI
    summary: Terminal UI for everyday Git workflows such as staging, committing, rebasing, stashing, branch navigation, and conflict-oriented local review.
    agent_usefulness: medium
    human_usefulness: high
    risk: medium
    recommended_status: recommended
    install: brew install lazygit
    notes: Best default local Git TUI; pair with gh or gh-dash for GitHub pull request and issue workflows.

  - name: gitui
    repo: gitui-org/gitui
    url: https://github.com/gitui-org/gitui
    kind: git-tui
    category: Git TUI
    summary: Fast Rust terminal UI for local Git workflows, including diff, commit, stash, blame, log, and index operations.
    agent_usefulness: low
    human_usefulness: medium
    risk: medium
    recommended_status: situational
    install: brew install gitui
    notes: Lightweight Rust Git TUI alternative; keep as an alternative rather than the default over lazygit.

  - name: tig
    repo: jonas/tig
    url: https://github.com/jonas/tig
    kind: git-tui
    category: Git TUI
    summary: Mature text-mode interface for browsing Git history, diffs, refs, blame, and repository state in minimal terminal environments.
    agent_usefulness: low
    human_usefulness: medium
    risk: low
    recommended_status: situational
    install: brew install tig
    notes: Good fallback for SSH, server, and low-dependency environments; less guided than newer Git TUIs.

  - name: gitu
    repo: altsem/gitu
    url: https://github.com/altsem/gitu
    kind: git-tui
    category: Git TUI
    summary: Magit-inspired terminal Git client for hunk and line staging, commits, fixups, rebases, stashes, and local history workflows.
    agent_usefulness: low
    human_usefulness: medium
    risk: medium
    recommended_status: watch
    install: cargo install gitu
    notes: Promising Magit-style TUI with narrower adoption than lazygit and gitui; keep in watch until use cases are clearer.

  - name: delta
    repo: dandavison/delta
    url: https://github.com/dandavison/delta
    kind: git-pager
    category: Git Diff and Repo Utilities
    summary: Syntax-highlighting pager for Git, diff, grep, ripgrep JSON, and blame output that improves review readability.
    agent_usefulness: medium
    human_usefulness: high
    risk: low
    recommended_status: recommended
    install: brew install git-delta
    notes: High-value diff and pager upgrade; improves review readability without replacing Git or GitHub workflows.

  - name: ghq
    repo: x-motemen/ghq
    url: https://github.com/x-motemen/ghq
    kind: repo-manager
    category: Git Diff and Repo Utilities
    summary: Local repository manager that standardizes clone locations and makes multi-host or polyrepo workspaces easier to navigate.
    agent_usefulness: medium
    human_usefulness: high
    risk: low
    recommended_status: situational
    install: brew install ghq
    notes: Useful for polyrepo and multi-host local repository organization; not a GitHub API tool.

  - name: hub
    repo: mislav/hub
    url: https://github.com/mislav/hub
    kind: cli
    category: Legacy / Avoid
    summary: Legacy command line wrapper that extends Git with GitHub operations but has largely been superseded by the official GitHub CLI.
    agent_usefulness: low
    human_usefulness: low
    risk: medium
    recommended_status: avoid
    install: brew install hub
    notes: Keep only to explain migration pressure toward gh; do not recommend for new GitHub CLI workflows.
