name: Tool removal or deprecation
description: Propose removing, avoiding, or deprecating an existing entry.
title: "Remove or deprecate tool: "
labels:
  - area:curation
  - type:task
  - evidence:needs-verification
body:
  - type: input
    id: tool-name
    attributes:
      label: Existing tool name
    validations:
      required: true
  - type: dropdown
    id: proposed-action
    attributes:
      label: Proposed action
      options:
        - remove
        - move to avoid
        - move to watch
        - update notes only
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Broken source, archived repo, superseded tool, security concern, or category mismatch.
    validations:
      required: true
  - type: textarea
    id: public-evidence
    attributes:
      label: Public evidence
      description: Link to public sources or reproducible command output that supports the decision.
    validations:
      required: true
  - type: textarea
    id: replacement
    attributes:
      label: Replacement or migration path
      description: Name the safer default, if any.
    validations:
      required: false
